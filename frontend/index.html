<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>Sticky Lite</h1>
    </header>
    
    
    
    <main class="app-layout">

        <section class="notes-sidebar">
            <h2>Your Notes</h2>

            <section id="notes-container"></section>
        </section>

        <section class="editor-panel">
            <h2>Note Editor</h2>

            <form id="note-form">
                <input id="note-title" type="text" placeholder="Note title">

                <textarea id="note-content" placeholder="Write your note here"></textarea>

                <button id="submit-button" type="submit">Save Note</button>

                <button id="cancel-edit-button" type="button">Cancel Edit</button>
                
            </form>
            
            <p id="status-message"></p>
            
        </section>
        
    </main>

    <script src="script.js"></script>
</body>
</html>
